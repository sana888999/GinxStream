<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body { width: 340px; min-height: 120px; font-family: system-ui, sans-serif; font-size: 13px; margin: 0; padding: 12px; }
    h3 { margin: 0 0 10px 0; font-size: 14px; }
    .status { color: #666; margin-bottom: 10px; word-break: break-all; font-size: 12px; }
    .status.ready { color: #0a0; }
    .status.error { color: #c00; }
    .btn { width: 100%; padding: 10px; margin: 4px 0; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 600; }
    .btn-download { background: #0066cc; color: #fff; }
    .btn-download:hover { background: #0052a3; }
    .btn-download:disabled { background: #999; cursor: not-allowed; }
    .btn-secondary { background: #f0f0f0; color: #333; }
    .btn-secondary:hover { background: #e0e0e0; }
    .hint { font-size: 11px; color: #888; margin-top: 10px; }
    .capture-preview { font-size: 10px; color: #555; line-height: 1.35; margin: 8px 0 0 0; padding: 8px; background: #f7f7f7; border-radius: 4px; white-space: pre-wrap; word-break: break-all; max-height: 72px; overflow: hidden; }
    .capture-preview:empty { display: none; }
    a.opts { font-size: 11px; }
  </style>
</head>
<body>
  <h3>SanaGinx DRM Capture</h3>
  <p class="hint"><a class="opts" href="#" id="openOptions">Configure capture rules</a> for your site (license URL, headers, MPD).</p>
  <div id="status" class="status">Play a DRM video to capture MPD + license.</div>
  <div id="capturePreview" class="capture-preview" aria-label="Capture summary"></div>
  <button id="download" class="btn btn-download" disabled>Download</button>
  <button id="refresh" class="btn btn-secondary">Clear &amp; refresh page</button>
  <p class="hint">Start <code>python firefox/server/download_server.py</code> first. Token/license headers expire — refresh after each play session.</p>
  <script src="popup.js"></script>
</body>
</html>
