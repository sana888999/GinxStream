<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body { width: 320px; min-height: 120px; font-family: system-ui, sans-serif; font-size: 13px; margin: 0; padding: 12px; }
    h3 { margin: 0 0 10px 0; font-size: 14px; }
    .status { color: #666; margin-bottom: 10px; word-break: break-all; font-size: 12px; }
    .status.ready { color: #0a0; }
    .status.error { color: #c00; }
    .btn { width: 100%; padding: 10px; margin: 4px 0; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 600; }
    .btn-download { background: #0066cc; color: #fff; }
    .btn-download:hover { background: #0052a3; }
    .btn-download:disabled { background: #999; cursor: not-allowed; }
    .btn-refresh { background: #f0f0f0; color: #333; }
    .btn-refresh:hover { background: #e0e0e0; }
    .hint { font-size: 11px; color: #888; margin-top: 10px; }
  </style>
</head>
<body>
  <h3>Skool Video Downloader</h3>
  <div id="status" class="status">Play the video on the page to capture.</div>
  <button id="download" class="btn btn-download" disabled>Download</button>
  <button id="refresh" class="btn btn-refresh">Refresh token</button>
  <p class="hint">If download fails (expired token), click Refresh token then play the video again and Download.</p>
  <script src="popup.js"></script>
</body>
</html>
